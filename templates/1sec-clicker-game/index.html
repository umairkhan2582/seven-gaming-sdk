<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Seven Chain — 1-Second Clicker</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #09090b; color: #e4e4e7; font-family: "Courier New", monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 1rem; padding: 2rem; }
.badge { background: #18181b; border: 1px solid #27272a; padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.7rem; color: #71717a; }
h1 { font-size: 2.5rem; color: #f59e0b; letter-spacing: 0.1em; }
p { color: #71717a; font-size: 0.85rem; }
#score { font-size: 5rem; font-weight: bold; color: #f59e0b; line-height: 1; }
#btn { background: #f59e0b; color: #000; border: none; padding: 1.25rem 3rem; font-size: 1.25rem; border-radius: 8px; cursor: pointer; font-weight: bold; letter-spacing: 0.05em; transition: opacity 0.1s, transform 0.1s; }
#btn:active { transform: scale(0.96); }
#btn:disabled { opacity: 0.4; cursor: not-allowed; }
#status { color: #71717a; font-size: 0.75rem; min-height: 1.2rem; }
#feed { width: min(480px, 100%); max-height: 220px; overflow-y: auto; display: flex; flex-direction: column; gap: 2px; }
.tx { background: #18181b; border-left: 3px solid #10b981; padding: 0.4rem 0.6rem; font-size: 0.65rem; display: flex; justify-content: space-between; border-radius: 0 4px 4px 0; animation: flash 0.4s ease; }
@keyframes flash { from { border-left-color: #6ee7b7; background: #052e16; } to { border-left-color: #10b981; background: #18181b; } }
.tx-hash { color: #60a5fa; }
.tx-meta { color: #10b981; }
</style>
</head>
<body>
  <div class="badge">Chain 70007 • 1-second blocks • EVM compatible</div>
  <h1>1-Sec Clicker</h1>
  <p>Every click fires a real on-chain transaction. Watch 1-second finality.</p>
  <div id="score">0</div>
  <button id="btn" onclick="mine()" disabled>Mine Block</button>
  <div id="status">Connecting...</div>
  <div id="feed"></div>

<script>
const API = "https://theseven.meme";
let sessionId = null, score = 0, busy = false;

async function init() {
  const name = prompt("Enter your miner name:") || "Anonymous";
  try {
    const r = await fetch(API + "/api/gaming/session", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ playerName: name })
    });
    const d = await r.json();
    sessionId = d.sessionId;
    document.getElementById("status").textContent = "Session ready | Wallet: " + d.demoWallet.slice(0, 10) + "...";
    document.getElementById("btn").disabled = false;
  } catch(e) {
    document.getElementById("status").textContent = "API unreachable — transactions will be simulated";
    sessionId = "local-" + Math.random().toString(36).slice(2);
    document.getElementById("btn").disabled = false;
  }
}

async function mine() {
  if (busy) return;
  busy = true;
  document.getElementById("btn").disabled = true;
  const t0 = Date.now();
  try {
    const r = await fetch(API + "/api/gaming/action", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ sessionId, actionType: "kill", points: 10 })
    });
    const tx = await r.json();
    score += tx.points;
    const ms = Date.now() - t0;
    document.getElementById("score").textContent = score;
    document.getElementById("status").textContent = "Block #" + tx.blockNumber + " confirmed in " + ms + "ms";
    addTx(tx.txHash, tx.blockNumber, ms);
  } catch(e) {
    score += 10;
    document.getElementById("score").textContent = score;
    document.getElementById("status").textContent = "Simulated (API offline)";
  }
  busy = false;
  document.getElementById("btn").disabled = false;
}

function addTx(hash, block, ms) {
  const div = document.createElement("div");
  div.className = "tx";
  div.innerHTML = "<span class=tx-hash>" + hash.slice(0, 18) + "...</span><span class=tx-meta>Block #" + block + " | " + ms + "ms</span>";
  const feed = document.getElementById("feed");
  feed.prepend(div);
  while (feed.children.length > 10) feed.lastChild.remove();
}

window.onload = init;
</script>
</body>
</html>
