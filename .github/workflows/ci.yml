name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sdk:
    name: SDK — typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: pnpm install
      - run: pnpm --filter @seven-gaming/sdk typecheck
      - run: pnpm --filter @seven-gaming/sdk build

  contracts:
    name: Contracts — compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: cd contracts && npm install
      - run: cd contracts && npx hardhat compile

